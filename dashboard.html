<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakCareerHub Admin Dashboard</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#0d6efd;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#198754;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#146c43;
}

#message{
margin-top:15px;
font-weight:bold;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h1>PakCareerHub Admin</h1>

<input type="text" id="jobTitle" placeholder="Job Title">

<select id="department">
    <option value="">Select Department</option>
    <option>Pakistan Army</option>
    <option>Pakistan Navy</option>
    <option>Pakistan Air Force</option>
    <option>FIA</option>
    <option>Police</option>
    <option>ASF</option>
    <option>PPSC</option>
    <option>FPSC</option>
    <option>WAPDA</option>
    <option>NADRA</option>
    <option>Other</option>
</select>

<input type="date" id="lastDate">

<select id="status">
<option>Open</option>
<option>Closed</option>
</select>

<input type="url" id="applyLink" placeholder="Official Apply Link">

<button id="saveJob">Save Job</button>

<p id="message"></p>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
